<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Hinário Offline</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            color: var(--text);
        }

        /* Cabeçalho Fixo */
        header {
            background: var(--primary);
            color: white;
            padding: 1rem;
            position: sticky;
            top: 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .search-container {
            padding: 10px;
            background: white;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Evita zoom no iPhone */
        }

        /* Lista de Hinos */
        #lista-hinos {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .hino-item {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .hino-numero {
            background: var(--accent);
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Visualização do Hino */
        #detalhe-hino {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 10;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn-voltar {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .letra-hino {
            white-space: pre-wrap; /* Mantém as quebras de linha */
            font-size: 1.2rem;
            line-height: 1.6;
            padding-bottom: 50px;
        }
    </style>
</head>
<body>

<header>
    <h2 id="app-title">Hinário Digital</h2>
</header>

<div id="lista-container">
    <div class="search-container">
        <input type="text" id="busca" placeholder="Buscar por número ou título..." onkeyup="filtrarHinos()">
    </div>
    <ul id="lista-hinos">
        </ul>
</div>

<div id="detalhe-hino">
    <button class="btn-voltar" onclick="fecharHino()">← Voltar</button>
    <h2 id="hino-titulo-exibicao"></h2>
    <div class="letra-hino" id="hino-letra-exibicao"></div>
</div>

<script>
    // 1. Nossa "Base de Dados" de Hinos
    const hinos = [
        { id: 1, titulo: "Luz do Mundo", letra: "Luz do mundo, que vieste a nós,\nTrazer a paz e o perdão.\n\nCoro:\nGlória a Deus nas alturas!\nPaz na terra aos homens." },
        { id: 2, titulo: "Grata Memória", letra: "Oh, que grata memória,\nDo Teu amor sem fim.\n\nTu morreste na cruz,\nPor causa de mim." },
        { id: 3, titulo: "Castelo Forte", letra: "Castelo forte é o nosso Deus,\nAmparo e fortaleza." }
    ];

    const listaUl = document.getElementById('lista-hinos');

    // 2. Função para carregar a lista
    function carregarLista(dados) {
        listaUl.innerHTML = '';
        dados.forEach(hino => {
            const li = document.createElement('li');
            li.className = 'hino-item';
            li.onclick = () => abrirHino(hino);
            li.innerHTML = `<span class="hino-numero">${hino.id}</span> <strong>${hino.titulo}</strong>`;
            listaUl.appendChild(li);
        });
    }

    // 3. Funções de Navegação
    function abrirHino(hino) {
        document.getElementById('hino-titulo-exibicao').innerText = `${hino.id}. ${hino.titulo}`;
        document.getElementById('hino-letra-exibicao').innerText = hino.letra;
        document.getElementById('detalhe-hino').style.display = 'block';
    }

    function fecharHino() {
        document.getElementById('detalhe-hino').style.display = 'none';
    }

    // 4. Sistema de Busca
    function filtrarHinos() {
        const termo = document.getElementById('busca').value.toLowerCase();
        const filtrados = hinos.filter(h => 
            h.titulo.toLowerCase().includes(termo) || 
            h.id.toString().includes(termo)
        );
        carregarLista(filtrados);
    }

    // Inicializar
    carregarLista(hinos);
</script>

</body>

</html>
